<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Article Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <span class="brand-dot"></span>
      <span class="brand-label">CMS</span>
    </div>

    <nav class="sidebar__nav">
      <button class="nav-item active" data-view="articles">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Articles
      </button>
      <button class="nav-item" data-view="new">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Article
      </button>
    </nav>

    <div class="sidebar__footer">
      <div class="status-dot" id="db-status-dot"></div>
      <span id="db-status-label">Connecting…</span>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">

    <!-- Articles list view -->
    <section class="view" id="view-articles">
      <header class="view-header">
        <h1 class="view-title">Articles</h1>
        <button class="btn btn--primary" id="btn-new-from-list">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Article
        </button>
      </header>
      <div class="article-list" id="article-list">
        <div class="list-empty" id="list-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>No articles yet.</p>
        </div>
      </div>
    </section>

    <!-- Editor view -->
    <section class="view hidden" id="view-editor">
      <header class="view-header">
        <button class="btn btn--ghost btn--back" id="btn-back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Articles
        </button>
        <div class="editor-actions">
          <button class="btn btn--ghost btn--danger" id="btn-delete" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Delete
          </button>
          <a class="btn btn--ghost" id="btn-preview" target="_blank" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Preview
          </a>
          <button class="btn btn--primary" id="btn-save">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save
          </button>
        </div>
      </header>

      <!-- Toast -->
      <div class="toast" id="toast"></div>

      <div class="editor-body">
        <!-- Article meta -->
        <div class="editor-meta">
          <label class="field-label">Article ID <span class="field-hint">(used in URL — no spaces)</span></label>
          <input class="field-input field-input--mono" type="text" id="input-id" placeholder="my-article-slug" />
          <label class="field-label" style="margin-top:1rem">Title</label>
          <input class="field-input field-input--large" type="text" id="input-title" placeholder="Article title…" />
        </div>

        <!-- Sections -->
        <div class="sections-header">
          <h2 class="sections-label">Sections</h2>
          <div class="add-section-btns">
            <button class="btn btn--ghost btn--sm" id="btn-add-single">+ Single Column</button>
            <button class="btn btn--ghost btn--sm" id="btn-add-two">+ Two Column</button>
          </div>
        </div>

        <div class="sections-list" id="sections-list">
          <div class="sections-empty" id="sections-empty">
            <p>No sections yet. Add one above.</p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Block type picker modal ── -->
  <div class="modal-backdrop hidden" id="block-modal-backdrop">
    <div class="modal" id="block-modal">
      <div class="modal-header">
        <h3 class="modal-title">Add Block</h3>
        <button class="modal-close" id="block-modal-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-grid">
        <button class="block-type-btn" data-type="header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h8M4 18h12"/></svg>
          Header
        </button>
        <button class="block-type-btn" data-type="paragraph">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
          Paragraph
        </button>
        <button class="block-type-btn" data-type="image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Image
        </button>
        <button class="block-type-btn" data-type="video">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          Video
        </button>
      </div>
    </div>
  </div>

  <!-- ── Confirm delete modal ── -->
  <div class="modal-backdrop hidden" id="confirm-modal-backdrop">
    <div class="modal modal--sm">
      <div class="modal-header">
        <h3 class="modal-title">Delete Article</h3>
      </div>
      <p class="modal-body-text">This will permanently delete the article from Firestore. This cannot be undone.</p>
      <div class="modal-footer">
        <button class="btn btn--ghost" id="confirm-cancel">Cancel</button>
        <button class="btn btn--danger" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>

name: Deploy Public Folder

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Verify public folder exists
        run: |
          echo "Listing repo root:"
          ls -la
          echo "Checking public folder:"
          ls -la public

      - name: Prepare deploy directory
        run: |
          mkdir deploy
          cp -r public/. deploy/

      - name: Init admin branch and commit
        run: |
          cd deploy
          git init
          git checkout -b admin

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Deploy public" || echo "No changes to commit"

      - name: Push to admin branch
        run: |
          cd deploy
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git admin --force
